name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            script: build:bun:mac-arm64
            artifact: atlas-darwin-arm64
          - target: darwin-x64
            os: macos-latest
            script: build:bun:mac-x64
            artifact: atlas-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            script: build:bun:linux-x64
            artifact: atlas-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            script: build:bun:linux-arm64
            artifact: atlas-linux-arm64
          - target: windows-x64
            os: ubuntu-latest
            script: build:bun:win-x64
            artifact: atlas-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build binary
        run: npm run ${{ matrix.script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-bun/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-bun
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-bun/*
          generate_release_notes: true
